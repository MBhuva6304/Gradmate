<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Gradmate — Settings</title>
<style>
  :root{
    --brand:#0069FF; --brand-600:#2563EB;
    --ok:#10B981; --bad:#EF4444;
    --bg:#F9FAFB; --card:#FFFFFF; --border:#E5E7EB;
    --text:#111827; --text2:#4B5563; --muted:#EEF2F7;
    --shadow:0 4px 6px -1px rgba(0,0,0,.08),0 2px 4px -2px rgba(0,0,0,.06);
    --radius:12px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial}

  /* Layout */
  .app{display:flex;min-height:100vh;gap:20px;padding:20px}
  .sidebar{
    width:280px;background:var(--card);border:1px solid var(--border);
    border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;
    display:flex;flex-direction:column;gap:16px
  }
  .brand{display:flex;align-items:center;gap:12px;padding:8px 6px}
  .brand-badge{width:64px;height:64px;border-radius:16px;background:linear-gradient(180deg,#614DE0,#2D6CDF);
    display:grid;place-items:center;color:#fff;font-weight:800;font-size:34px}
  .brand-title{font-size:28px;font-weight:700;letter-spacing:.01em}
  .nav{display:flex;flex-direction:column;gap:8px;margin-top:8px}
  .nav a{ text-decoration:none;color:var(--text);display:flex;align-items:center;gap:10px;
    padding:12px;border-radius:12px;font-size:16px}
  .nav a:hover{background:#F3F4F6}
  .nav a.active{background:#E5E6E6}
  .sidebar-footer{margin-top:auto;font-size:13px;color:#6B7280}

  .main{flex:1;display:flex;flex-direction:column;gap:20px}
  .topbar{display:flex;gap:12px;align-items:center;background:var(--card);
    border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;box-shadow:var(--shadow)}
  .search{flex:1;display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--border);
    border-radius:10px;padding:10px 12px}
  .search input{border:0;outline:none;font-size:14px;flex:1}
  .btn{background:var(--brand);color:#fff;border:0;border-radius:10px;padding:10px 14px;font-weight:600;cursor:pointer}
  .btn.ghost{background:#EEF2F6;color:#111827}
  .avatar{width:36px;height:36px;border-radius:999px;background:var(--brand);display:grid;place-items:center;color:#fff;font-weight:700}

  /* Cards & sections */
  .settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  .section{border:1px solid var(--border);border-radius:12px;padding:16px;background:#fff}
  .section h3{margin:0 0 6px 0}
  .section p{margin:0 0 14px 0;color:var(--text2);font-size:14px}
  .row{display:grid;grid-template-columns:220px 1fr;gap:16px;align-items:center;margin:10px 0}
  .row label{font-weight:600}
  .text, .select{
    width:100%; border:1px solid var(--border); border-radius:10px; padding:10px 12px;
    background:#fff; font-size:14px; color:var(--text)
  }
  .text[disabled], .select[disabled]{background:#F9FAFB;color:#6B7280}
  .help{color:#6B7280;font-size:12px;margin-top:6px}
  .actions{display:flex;gap:10px;justify-content:flex-end;margin-top:12px}

  /* Toast */
  .toast{
    position:fixed; right:20px; bottom:20px; background:#111827; color:#fff; padding:12px 14px;
    border-radius:10px; box-shadow:var(--shadow); opacity:0; transform:translateY(6px);
    transition:all .25s ease; pointer-events:none; z-index:50;
  }
  .toast.show{opacity:1; transform:translateY(0)}

  @media (max-width:1200px){ .settings-grid{grid-template-columns:1fr} .row{grid-template-columns:1fr} }
  @media (max-width:900px){ .app{flex-direction:column} .sidebar{width:100%} }
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar" aria-label="Sidebar">
    <div class="brand">
      <div class="brand-badge">G</div>
      <div class="brand-title">Gradmate</div>
    </div>
    <nav class="nav">
      <a href="#">🏠 Dashboard</a>
      <a href="#">🧭 Degree Plan</a>
      <a href="#">📚 Courses</a>
      <a href="#">📄 Audit</a>
      <a href="#" class="active" aria-current="page">⚙️ Settings</a>
    </nav>
    <div class="sidebar-footer">BS CS Catalog 2023</div>
  </aside>

  <!-- Main -->
  <main class="main">
    <!-- Topbar -->
    <div class="topbar">
      <div class="search" role="search">
        <span aria-hidden="true">🔎</span>
        <input type="search" placeholder="Search settings…" />
      </div>
      <!-- Forgot Password button removed -->
      <button class="btn" type="button" onclick="save()">Save</button>
      <div class="avatar" aria-label="Profile">M</div>
    </div>

    <!-- Content (Profile + Notifications only) -->
    <div class="settings-grid">

      <!-- Profile with Edit toggle -->
      <section class="section" id="profile">
        <h3>Profile</h3>
        <p>Basic info used across your plan, audit, and exports.</p>

        <div class="row">
          <label for="name">Full name</label>
          <input id="name" class="text" placeholder="Your name" value="Maya Chen" disabled />
        </div>

        <div class="row">
          <label for="email">Email</label>
          <input id="email" class="text" placeholder="you@university.edu" value="maya.chen@uni.edu" disabled />
        </div>

        <div class="row">
          <label for="catalog">Catalog year</label>
          <select id="catalog" class="select" disabled>
            <option>2024–2025</option>
            <option selected>2023–2024</option>
            <option>2022–2023</option>
          </select>
        </div>

        <div class="row">
          <label for="major">Major</label>
          <input id="major" class="text" value="B.S. Computer Science" disabled />
        </div>

        <div class="actions">
          <button class="btn" type="button" id="editBtn">Edit</button>
          <button class="btn" type="button" onclick="save()">Save</button>
        </div>
      </section>

      <!-- Notifications -->
      <section class="section">
        <h3>Notifications</h3>
        <p>Stay on top of registration and graduation tasks.</p>

        <div class="row">
          <label for="email-notif">Email notifications</label>
          <input id="email-notif" class="switch" type="checkbox" checked />
        </div>

        <div class="row">
          <label for="reminders">Course reminders</label>
          <select id="reminders" class="select">
            <option>Off</option>
            <option selected>Weekly</option>
            <option>Daily during enrollment</option>
          </select>
        </div>

        <div class="row">
          <label for="digest">Weekly digest day</label>
          <select id="digest" class="select">
            <option>Monday</option><option selected>Friday</option><option>Sunday</option>
          </select>
        </div>

        <div class="actions">
          <button class="btn" type="button" onclick="save()">Save</button>
        </div>
      </section>

      <!-- Security (Change Password inline) -->
      <section class="section" id="security">
        <h3>Security</h3>
        <p>Update your password and manage access.</p>

        <div class="row">
          <label for="current">Current password</label>
          <input id="current" class="text" type="password" placeholder="••••••••" />
        </div>

        <div class="row">
          <label for="newpass">New password</label>
          <input id="newpass" class="text" type="password" placeholder="At least 8 characters" />
        </div>

        <div class="row">
          <label for="confirmpass">Confirm new password</label>
          <input id="confirmpass" class="text" type="password" placeholder="Re-enter new password" />
        </div>

        <div class="actions">
          <button class="btn" type="button" onclick="changePassword()">Change Password</button>
        </div>
      </section>

    </div>
  </main>
</div>

<!-- Toast -->
<div id="toast" class="toast" role="status" aria-live="polite">Settings saved</div>

<script>
  // Toggle "Edit" for Profile fields
  const editBtn = document.getElementById('editBtn');
  const editable = ['name','email','catalog','major'].map(id=>document.getElementById(id));
  editBtn.addEventListener('click', ()=>{
    const enable = editable[0].disabled; // toggle state
    editable.forEach(el=>el.disabled = !enable);
    editBtn.textContent = enable ? 'Lock' : 'Edit';
  });

  // Simple save toast
  function toast(msg, ms=1600){
    const t=document.getElementById('toast');
    t.textContent=msg; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), ms);
  }
  function save(){ toast('Settings saved'); }

  // Change password (inline)
  function changePassword(){
    const cur = document.getElementById('current').value.trim();
    const n = document.getElementById('newpass').value.trim();
    const c = document.getElementById('confirmpass').value.trim();
    if(n.length < 8){ toast('Password must be at least 8 characters'); return; }
    if(n !== c){ toast('Passwords do not match'); return; }
    // demo only
    toast('Password updated');
    document.getElementById('current').value='';
    document.getElementById('newpass').value='';
    document.getElementById('confirmpass').value='';
  }
</script>
</body>
</html>
