<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gradmate — Create Your Account</title>
  <style>
    :root{
      --blue:#0069FF; --blue-600:#2563EB; --ring:#2563EB;
      --bg:#F9FAFB; --card:#FFFFFF; --border:#E5E7EB;
      --text:#111827; --text2:#4B5563;
      --shadow:0 4px 6px -1px rgba(0,0,0,.1),0 2px 4px -2px rgba(0,0,0,.1);
      --radius:12px; --radius-lg:16px; --radius-xl:24px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial,"Apple Color Emoji","Segoe UI Emoji";color:var(--text);background:var(--bg)}
    .container{max-width:1380px;margin:0 auto;padding:20px}
    header{background:#fff;border-bottom:1px solid rgba(112,112,112,.2);margin-bottom:8px}
    .brand{display:flex;align-items:center;gap:14px;padding-left:8px}
    .brand-badge{width:54px;height:54px;border-radius:16px;background:linear-gradient(180deg,#614DE0 0%,#2D6CDF 100%);color:#fff;display:grid;place-items:center;font-weight:800;font-size:28px;box-shadow:var(--shadow)}
    h1{font-size:28px;margin:0;font-weight:800;letter-spacing:.2px}
    .grid{display:grid;grid-template-columns:1fr 520px;gap:20px}
    .card{background:var(--card);border:1px solid rgba(112,112,112,.35);border-radius:var(--radius);box-shadow:var(--shadow)}
    .card-head{padding:18px 18px 8px;font-weight:800;font-size:20px;border-bottom:1px solid rgba(112,112,112,.25)}
    .card-body{padding:20px}
    form .two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px}
    .box{display:flex;flex-direction:column;gap:8px}
    .box label{font-size:14px;font-weight:700}
    .input,.search{width:100%;height:44px;padding:10px 12px;border-radius:12px;border:1px solid var(--border);background:#fff;color:var(--text);outline:none;transition:.15s border-color,.15s box-shadow}
    .input:focus,.search:focus{border-color:var(--ring);box-shadow:0 0 0 3px rgba(37,99,235,.15)}
    .btn{height:44px;padding:0 16px;border-radius:12px;border:1px solid transparent;background:var(--blue);color:#fff;font-weight:700;cursor:pointer;box-shadow:var(--shadow)}
    .btn.secondary{background:#fff;color:var(--text);border-color:var(--border)}
    .actions{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
    .course-toolbar{display:flex;gap:10px;margin-bottom:12px}
    .course-results,.course-selected{border:1px solid var(--border);border-radius:12px;background:#fff;min-height:220px;max-height:380px;overflow:auto;padding:6px}
    .list-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;border-radius:10px;line-height:1.2}
    .list-item + .list-item{margin-top:6px}
    .list-item:hover{background:#F3F4F6}
    .pill{font-size:12px;background:#EEF2FF;border:1px solid #E0E7FF;border-radius:999px;padding:2px 8px}
    .mini{height:34px;border-radius:10px;padding:0 10px}
    .muted{color:var(--text2);font-size:12px}
    .page-footer{display:flex;justify-content:flex-end;padding:16px 0 26px;position:sticky;bottom:-1px;background:linear-gradient(180deg,rgba(249,250,251,0) 0%,rgba(249,250,251,1) 40%)}
    @media (max-width:1100px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header>
    <div class="container brand">
      <div class="brand-badge" aria-hidden="true">G</div>
      <h1>Gradmate</h1>
    </div>
  </header>

  <main class="container">
    <div class="grid">
      <!-- ================= Left: Personal Information ================= -->
      <section class="card" id="personal-card">
        <div class="card-head">Personal Information</div>
        <div class="card-body">
          <form id="create-form" novalidate>
            <div class="two-col">
              <div class="box" id="box-fullname" data-box="fullname">
                <label for="fullname">Full Name</label>
                <input class="input" id="fullname" name="fullname" autocomplete="name" />
              </div>

              <div class="box" id="box-email" data-box="email">
                <label for="email">Email Address</label>
                <input class="input" id="email" name="email" type="email" autocomplete="email" />
              </div>

              <!-- keep the required rectangle name -->
              <div class="box" id="passwordbox" data-box="password">
                <label for="password">Create Password</label>
                <input class="input" id="password" name="password" type="password" autocomplete="new-password" />
              </div>

              <div class="box" id="box-confirm" data-box="confirm">
                <label for="confirm">Confirm Password</label>
                <input class="input" id="confirm" name="confirm" type="password" autocomplete="new-password" />
              </div>

              <div class="box" id="box-program" data-box="program">
                <label for="program">Program</label>
                <input class="input" id="program" name="program" placeholder="e.g., B.S. Computer Science" />
              </div>

              <div class="box" id="box-catalog" data-box="catalog-year">
                <label for="catalogYear">Catalog Year</label>
                <input class="input" id="catalogYear" name="catalogYear" placeholder="e.g., 2023" />
              </div>
            </div>

            <div class="actions" style="margin:16px 0 8px">
              <button type="button" id="btn-verify" class="btn">Verify Your Email Id</button>
              <span class="muted" id="verify-hint" aria-live="polite"></span>
            </div>

            <div class="box" id="box-target" data-box="targeted-graduation" style="max-width:420px">
              <label for="gradDate">Targeted graduation</label>
              <input class="input" id="gradDate" name="gradDate" placeholder="MM/YYYY" />
            </div>

            <input type="hidden" name="completedCourses" id="completedCoursesField" />
          </form>
        </div>
      </section>

      <!-- ================= Right: Completed Courses Picker ================= -->
      <aside class="card" id="courses-card">
        <div class="card-head">Add Completed Courses</div>
        <div class="card-body">
          <div class="course-toolbar">
            <input id="course-search" class="search" placeholder="🔎 Search" aria-label="Search courses" />
            <button class="btn mini secondary" id="toggle-edit" type="button">Edit</button>
          </div>

          <div class="box" id="box-results" data-box="results">
            <label class="muted">Results <span id="loadStatus" class="muted"></span></label>
            <div id="results" class="course-results" aria-live="polite"></div>
          </div>

          <div class="box" id="box-selected" data-box="selected" style="margin-top:14px">
            <label class="muted">Added to your record</label>
            <div id="selected" class="course-selected"></div>
          </div>
        </div>
      </aside>
    </div>

    <div class="page-footer">
      <button class="btn" id="submit-btn" form="create-form">Create Your Account</button>
    </div>
  </main>

  <!-- Preferred shared loader (if present) -->
  <script src="/lib/catalog.js"></script>
  <!-- Backup legacy source (if your project still has it) -->
  <script src="/courses.js"></script>

  <script>
    // ========================== Robust course loader ==========================
    const $ = (id)=>document.getElementById(id);
    const $results  = $('results');
    const $selected = $('selected');
    const $search   = $('course-search');
    const $hidden   = $('completedCoursesField');
    const $status   = $('loadStatus');

    const picked = new Map(); // code -> course

    // Normalize any raw list into {id, code, title, tags, prerequisites}
    function normalize(list){
      const out = [];
      const seen = new Set();
      (list || []).forEach(it=>{
        if (!it) return;
        let code = it.code || it.id || it.name || it.course || (typeof it === 'string' ? it : '');
        if (!code) return;
        const id   = (it.id || code).toString();
        const title= it.title || it.desc || it.description || '';
        const tags = Array.isArray(it.tags) ? it.tags : (it.tag ? [it.tag] : []);
        const prereq = Array.isArray(it.prerequisites) ? it.prerequisites : [];
        code = code.toString().trim();
        const key = code.toUpperCase();
        if (seen.has(key)) return; seen.add(key);
        out.push({ id, code, title, tags, prerequisites: prereq });
      });
      return out;
    }

    async function loadAnyCourses(){
      const tries = [];

      // 1) GradmateCatalog (shared loader)
      if (window.GradmateCatalog && typeof GradmateCatalog.load === 'function'){
        const paths = ['/data/catalog.json','/catalog.json','catalog.json'];
        for (const p of paths){
          tries.push(async ()=>{
            await GradmateCatalog.load(p);
            const all = GradmateCatalog.data?.courses || GradmateCatalog.search?.({q:''}) || [];
            return normalize(all);
          });
        }
      }

      // 2) Global from courses.js
      tries.push(async ()=>{
        const src = (window.COURSES || window.courses || window.coursesList);
        if (!src) throw new Error('No global courses found');
        return normalize(src.default || src);
      });

      // 3) Direct JSON fetch fallbacks
      ['/data/courses.json','/courses.json'].forEach(p=>{
        tries.push(async ()=>{
          const r = await fetch(p, {cache:'no-store'});
          if (!r.ok) throw new Error('HTTP '+r.status);
          const j = await r.json();
          const arr = Array.isArray(j) ? j : (j.courses || []);
          return normalize(arr);
        });
      });

      // Try in order
      const errs = [];
      for (const t of tries){
        try{
          const list = await t();
          if (list && list.length){
            console.log('[Gradmate] Loaded', list.length, 'courses');
            return list;
          }
        }catch(e){ errs.push(e.message); }
      }
      throw new Error(`Could not load courses from any source. ${location.protocol==='file:' ? 'You are opening the file directly; use a local server.' : ''} Tries: ${errs.join(' | ')}`);
    }

    // ============================= UI wiring =============================
    function renderResults(items){
      $results.innerHTML = '';
      if (!items.length){
        $results.innerHTML = `<div class="muted" style="padding:12px">No courses found.</div>`;
        return;
      }
      for (const c of items){
        const row = document.createElement('div');
        row.className = 'list-item';
        const tags = (c.tags||[]).slice(0,2).map(t=>`<span class="pill">${t}</span>`).join(' ');
        row.innerHTML = `
          <div>
            <div style="font-weight:700">${c.code}</div>
            ${c.title ? `<div class="muted">${c.title}</div>`:''}
          </div>
          <div class="actions">
            ${tags}
            <button class="btn mini" data-add="${c.id || c.code}">Add</button>
          </div>`;
        $results.appendChild(row);
      }
    }

    function renderSelected(){
      $selected.innerHTML = '';
      if (!picked.size){
        $selected.innerHTML = `<div class="muted" style="padding:12px">Nothing added yet.</div>`;
        $hidden.value = '[]';
        return;
      }
      for (const c of picked.values()){
        const row = document.createElement('div');
        row.className = 'list-item';
        const prereqCount = (c.prerequisites||[]).length;
        row.innerHTML = `
          <div>
            <div style="font-weight:700">${c.code}</div>
            ${c.title ? `<div class="muted">${c.title}</div>`:''}
            ${prereqCount ? `<div class="muted">${prereqCount} prerequisite${prereqCount>1?'s':''}</div>`:''}
          </div>
          <button class="btn mini secondary" data-remove="${c.code}">Remove</button>`;
        $selected.appendChild(row);
      }
      $hidden.value = JSON.stringify(Array.from(picked.values()).map(c=>c.code));
    }

    function wireEvents(COURSES){
      const idx = (q)=> COURSES.filter(c=>{
        const n = q.toLowerCase();
        return c.code.toLowerCase().includes(n) || (c.title||'').toLowerCase().includes(n);
      }).slice(0,50);

      $('course-search').addEventListener('input', (e)=>renderResults(idx(e.target.value)));
      $results.addEventListener('click', (e)=>{
        const id = e.target?.dataset?.add;
        if (!id) return;
        const c = COURSES.find(x => (x.id||x.code) === id);
        if (!c) return;
        picked.set(c.code, c);
        renderSelected();
      });
      $selected.addEventListener('click', (e)=>{
        const code = e.target?.dataset?.remove;
        if (!code) return;
        picked.delete(code); renderSelected();
      });

      $('toggle-edit').addEventListener('click', ()=>{
        document.body.classList.toggle('editing'); renderSelected();
      });

      $('btn-verify').addEventListener('click', ()=>{
        const email = $('email').value.trim();
        const hint = $('verify-hint');
        if (!email){ hint.textContent = 'Enter your email first.'; return; }
        hint.textContent = 'Verification link sent. Check your inbox.';
        hint.style.color = 'var(--blue-600)';
      });

      $('submit-btn').addEventListener('click',(e)=>{
        e.preventDefault();
        const pw = $('password').value, cf = $('confirm').value;
        if (pw !== cf){ alert('Passwords do not match.'); return; }
        const payload = {
          fullname: $('fullname').value.trim(),
          email: $('email').value.trim(),
          program: $('program').value.trim(),
          catalogYear: $('catalogYear').value.trim(),
          gradDate: $('gradDate').value.trim(),
          completedCourses: Array.from(picked.values()).map(c=>c.code)
        };
        console.log('Create account payload:', payload);
        alert('Account created (demo). See console for payload.');
      });

      // first render
      renderResults(COURSES.slice(0,50));
      renderSelected();
    }

    // ============================= Boot =============================
    (async function boot(){
      try{
        $status.textContent = '(loading…)';
        const COURSES = await loadAnyCourses();
        $status.textContent = `(${COURSES.length} courses)`;
        wireEvents(COURSES);
      }catch(err){
        console.error(err);
        $status.textContent = '— failed to load';
        $results.innerHTML = `<div class="muted" style="padding:12px">${err.message}</div>`;
      }
    })();
  </script>
</body>
</html>
