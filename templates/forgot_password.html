<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset your password — Gradmate</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
  <main class="min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-3xl bg-white rounded-2xl shadow-xl p-10">
      <!-- Logo + Title -->
      <div class="mx-auto w-16 h-16 rounded-2xl bg-blue-600 flex items-center justify-center text-white text-3xl font-extrabold shadow-lg">
        G
      </div>
      <h1 class="text-4xl font-extrabold text-center mt-6 tracking-tight">Reset your password</h1>
      <p class="text-center text-gray-600 mt-2">
        Enter your email → verify OTP → set a new password.
      </p>

      <!-- Messages -->
      {% if messages %}
        <div class="mt-6 space-y-2">
          {% for m in messages %}
            <p class="text-sm {% if 'error' in m.tags %}text-red-600{% else %}text-green-600{% endif %}">
              {{ m }}
            </p>
          {% endfor %}
        </div>
      {% endif %}

      <!-- Form -->
      <form method="post" class="mt-8 space-y-5">
        {% csrf_token %}

        <div>
          <label class="block text-lg font-semibold text-gray-800 mb-2">Email</label>
          <input
            type="email"
            name="email"
            placeholder="Enter your email"
            value="{{ form.email.value|default_if_none:'' }}"
            autocomplete="email"
            class="w-full h-14 rounded-xl border border-gray-300 bg-white px-4 text-gray-900 outline-none focus:border-blue-600 focus:ring-2 focus:ring-blue-200"
            required
          />
          {% if form.email.errors %}
            <p class="mt-2 text-sm text-red-600">{{ form.email.errors|striptags }}</p>
          {% endif %}
        </div>

        <button
          type="submit"
          class="inline-flex items-center justify-center px-8 h-12 rounded-xl bg-blue-600 text-white font-semibold shadow hover:bg-blue-700 focus:outline-none focus:ring-4 focus:ring-blue-200">
          Send OTP
        </button>
      </form>

      <p class="text-center text-gray-600 mt-8">
        Remembered it?
        <a href="{% url 'login' %}" class="font-semibold text-blue-600 hover:underline">Back to sign in</a>
      </p>
    </div>
  </main>
</body>
</html>
