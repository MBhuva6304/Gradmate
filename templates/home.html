<!doctype html>
<html>
<head><meta charset="utf-8"><title>Home</title></head>
<body>
  {% if request.user.is_authenticated %}
    <p>You're logged in as <strong>{{ request.user.username}}</strong>.</p>

    <!-- Logout must be POST in Django 5 -->
    <form method="post" action="{% url 'logout' %}" style="display:inline;">
      {% csrf_token %}
      <button type="submit" style="background:none;border:none;color:blue;text-decoration:underline;cursor:pointer;padding:0;">
        Logout
      </button>
    </form>
  {% else %}
    <p>You are not logged in.</p>
    <p><a href="{% url 'login' %}">Go to Login</a></p>
  {% endif %}
</body>
</html>
