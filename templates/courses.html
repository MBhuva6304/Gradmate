{% extends "base.html" %}

{% block title %}Courses{% endblock %}

{% block content %}
<div class="px-4 sm:px-6 lg:px-8">
  <h1 class="mb-6 text-2xl font-semibold text-slate-900">Courses</h1>

  <form
    method="get"
    action="{% url 'courses' %}"
    class="mb-6 grid grid-cols-1 gap-3 md:grid-cols-2 xl:grid-cols-5"
  >
    <input type="hidden" name="q" value="{{ q }}">

    <div>
      <label class="sr-only" for="level">Level</label>
      <select
        id="level"
        name="level"
        class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"
      >
        {% for value, label in level_choices %}
          <option value="{{ value }}" {% if value == selected_level %}selected{% endif %}>
            {{ label }}
          </option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label class="sr-only" for="credits">Credits</label>
      <select
        id="credits"
        name="credits"
        class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"
      >
        {% for value, label in credit_choices %}
          <option value="{{ value }}" {% if value == selected_credits %}selected{% endif %}>
            {{ label }}
          </option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label class="sr-only" for="fulfillment">Fulfillment</label>
      <select
        id="fulfillment"
        name="fulfillment"
        class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"
      >
        {% for value, label in fulfillment_choices %}
          <option value="{{ value }}" {% if value == selected_fulfillment %}selected{% endif %}>
            {{ label }}
          </option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label class="sr-only" for="also_counts_for">Also Counts For</label>
      <select
        id="also_counts_for"
        name="also_counts_for"
        class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"
      >
        {% for value, label in also_counts_for_choices %}
          <option value="{{ value }}" {% if value == selected_also_counts_for %}selected{% endif %}>
            {{ label }}
          </option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label class="sr-only" for="count_type">Count Type</label>
      <select
        id="count_type"
        name="count_type"
        class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"
      >
        {% for value, label in count_type_choices %}
          <option value="{{ value }}" {% if value == selected_count_type %}selected{% endif %}>
            {{ label }}
          </option>
        {% endfor %}
      </select>
    </div>

    <div class="md:col-span-2 xl:col-span-5 flex gap-2">
      <button
        type="submit"
        class="inline-flex items-center justify-center rounded-lg bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-700"
      >
        Apply Filters
      </button>

      <a
        href="{% url 'courses' %}"
        class="inline-flex items-center justify-center rounded-lg bg-slate-200 px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-300"
      >
        Reset Filters
      </a>
    </div>
  </form>

  <div class="mb-2 flex items-center justify-between">
    <p class="text-xs text-slate-500">
      {{ results_count }} results
      {% if q and results_count > 24 %}
        (showing first 24)
      {% endif %}
  </div>

  <div id="courses-results">
    {% include "courses_list.html" %}
  </div>
</div>
{% endblock %}
